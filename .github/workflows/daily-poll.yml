name: Daily Routine

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Message
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.CHAT_ID }}" \
          -d text="✅ Test successful! Your GitHub Action is working."
